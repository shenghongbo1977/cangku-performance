    document.head.appendChild(s);
    setTimeout(() => { if (!window.supabase) cb(false); }, timeout);
  }
  function tryNext(i) {
    if (i >= cdns.length) { console.error('所有CDN均加载失败'); return; }
    loadScript(cdns[i], ok => {
      if (ok && window.supabase) console.log('Supabase SDK加载成功:', cdns[i]);
      else { console.warn('CDN ' + cdns[i] + ' 失败'); tryNext(i + 1); }
    }, 8000);
  }
  tryNext(0);
})();
</script>

async function loadAllData() {
  const client = initSupabase();
  if (!client) return false;
  setCloudStatus('connecting');
  try {
    const [usersRes, deptsRes, deptMRes, roundsRes, configRes, scoresRes] = await Promise.all([
      client.from('users').select('*').eq('is_active', true).order('id'),
      client.from('departments').select('*').eq('is_active', true).order('sort_order'),
      client.from('department_members').select('*'),
      client.from('rounds').select('*').order('created_at', {ascending:true}),
      client.from('app_config').select('value').eq('key', 'active_round_id'),
      client.from('scores').select('*')
    ]);
    allUsers = usersRes.data || [];
    departments = deptsRes.data || [];
    deptMembers = deptMRes.data || [];
    setCloudStatus('online');
    await loadRoundsData(roundsRes.data || [], configRes.data || [], scoresRes.data || []);
    return true;
  } catch(e) { console.error('loadAllData error:', e); setCloudStatus('error'); return false; }
}

async function loadRoundsData(roundsArr, configArr, scoresArr) {
  const roundsMap = {};
  roundsArr.forEach(r => {
    let config = r.config || {};
    if (typeof config === 'string') { try { config = JSON.parse(config); } catch(e) { config = {}; } }
    roundsMap[r.id] = { id: r.id, name: r.name, createdAt: r.created_at, status: r.status || 'active', config, scores: {} };
  });
  (scoresArr || []).forEach(s => {
    if (!roundsMap[s.round_id]) return;
    const rid = s.round_id;
    if (!roundsMap[rid].scores[s.rater_id]) roundsMap[rid].scores[s.rater_id] = {};
    if (s.category_id && s.raw_score !== null) {
      if (!roundsMap[rid].scores[s.rater_id][s.target_id]) roundsMap[rid].scores[s.rater_id][s.target_id] = {};
      roundsMap[rid].scores[s.rater_id][s.target_id][s.category_id] = s.raw_score;
    } else {
      roundsMap[rid].scores[s.rater_id][s.target_id] = { _total: s.score };
    }
  });
  const activeId = (configArr && configArr.length > 0) ? configArr[0].value : (roundsArr[0] ? roundsArr[0].id : null);
  roundsData = { rounds: Object.values(roundsMap), activeRoundId: activeId };
}

// ===== HELPERS =====
function getUserDepartments(userId) {
  const deptIds = deptMembers.filter(dm => dm.user_id === userId).map(dm => dm.department_id);
  return departments.filter(d => deptIds.includes(d.id));
}
function getChildDepts(parentId) {
  const children = departments.filter(d => d.parent_id === parentId);
  return children.concat(children.flatMap(c => getChildDepts(c.id)));
}
function getUserScopeDepts() {
  if (currentUser.is_admin) return departments;
  const headDepts = departments.filter(d => d.head_user_id === currentUser.id);
  const scope = [...headDepts];
  headDepts.forEach(d => { scope.push(...getChildDepts(d.id)); });
  return scope;
}
function getVisibleUsers() {
  if (currentUser.is_admin) return allUsers.filter(u => !u.is_admin);
  const scopeIds = getUserScopeDepts().map(d => d.id);
  const visibleUserIds = deptMembers.filter(dm => scopeIds.includes(dm.department_id)).map(dm => dm.user_id);
  return allUsers.filter(u => visibleUserIds.includes(u.id) && !u.is_admin);
}
function getActiveRound() {
  if (!roundsData) return null;
  return roundsData.rounds.find(r => r.id === roundsData.activeRoundId) || roundsData.rounds[0] || null;
}
function getRoundById(id) {
  return roundsData ? roundsData.rounds.find(r => r.id === id) : null;
}
function getCategories(round) {
  if (!round) return [{id:'total', name:'总分', weight:100}];
  let config = round.config || {};
  if (typeof config === 'string') { try { config = JSON.parse(config); } catch(e) { config = {}; } }
  return config.categories || [{id:'total', name:'总分', weight:100}];
}
function getTargetsForRound(round) {
  if (!round) return [];
  let config = round.config || {};
  if (typeof config === 'string') { try { config = JSON.parse(config); } catch(e) { config = {}; } }
  const ec = config.evaluatee_scope || {type:'all'};
  let users = allUsers.filter(u => !u.is_admin && u.id !== currentUser.id);
  if (ec.type === 'department' && ec.department_ids && ec.department_ids.length > 0) {
    const dmUserIds = deptMembers.filter(dm => ec.department_ids.includes(dm.department_id)).map(dm => dm.user_id);
    users = users.filter(u => dmUserIds.includes(u.id));
  } else if (ec.type === 'individual' && ec.user_ids && ec.user_ids.length > 0) {
    users = users.filter(u => ec.user_ids.includes(u.id));
  }
  return users;
}
function isUserEvaluator(round) {
  if (!round) return false;
  let config = round.config || {};
  if (typeof config === 'string') { try { config = JSON.parse(config); } catch(e) { config = {}; } }
  const ec = config.evaluator_scope || {type:'all'};
  if (ec.type === 'all') return true;
  if (ec.type === 'department' && ec.department_ids && ec.department_ids.length > 0) {
    const userDeptIds = deptMembers.filter(dm => dm.user_id === currentUser.id).map(dm => dm.department_id);
    return ec.department_ids.some(id => userDeptIds.includes(id));
  }
  if (ec.type === 'individual' && ec.user_ids) return ec.user_ids.includes(currentUser.id);
  return true;
}

// ===== SCORE PAGE =====
function renderScorePage() {
  if (!currentUser) return;
  const activeRound = getActiveRound();
  if (!activeRound) {
    document.getElementById('score-grid').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无激活的考评轮次</p><p style="margin-top:8px;font-size:12px;">请联系管理员创建考评</p></div>';
    document.getElementById('submit-all-wrap').style.display = 'none';
    document.getElementById('score-empty').style.display = 'block';
    return;
  }
  document.getElementById('score-empty').style.display = 'none';
  // Check if user can evaluate
  if (!isUserEvaluator(activeRound)) {
    document.getElementById('score-grid').innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>您不在本次考评的评分范围内</p></div>';
    document.getElementById('submit-all-wrap').style.display = 'none';
    return;
  }
  const targets = getTargetsForRound(activeRound);
  const categories = getCategories(activeRound);
  if (targets.length === 0) {
    document.getElementById('score-grid').innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>暂无需要评分的人员</p></div>';
    document.getElementById('submit-all-wrap').style.display = 'none';
    return;
  }
  // Load existing scores
  const myScores = activeRound.scores[currentUser.id] || {};
  currentScores = {};
  targets.forEach(t => {
    currentScores[t.id] = {};
    categories.forEach(c => {
      if (myScores[t.id] && myScores[t.id][c.id] !== undefined) {
        currentScores[t.id][c.id] = myScores[t.id][c.id];
      } else {
        currentScores[t.id][c.id] = 50;
      }
    });

  });
  document.getElementById('score-page-title').textContent = activeRound.name;
  document.getElementById('score-page-sub').textContent = '为 ' + targets.length + ' 名同事评分';

}

}

function calcRowTotal(targetId, categories) {
  const sc = currentScores[targetId] || {};
  let total = 0;
  categories.forEach(c => {
    const v = sc[c.id] !== undefined ? sc[c.id] : 50;
    total += v * (c.weight / 100);
  });
  return Math.round(total * 10) / 10;
}

function calcTargetTotal(scores, weightFactor) {
  if (!scores || scores.length === 0) return 0;
  return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * weightFactor * 10) / 10;
}

function onSlider(targetId, categoryId, val) {
  val = parseInt(val);
  if (!currentScores[targetId]) currentScores[targetId] = {};
  currentScores[targetId][categoryId] = val;
  const categories = getCategories(getActiveRound());
  const total = calcRowTotal(targetId, categories);
  const el = document.getElementById('total-num-' + targetId);
  if (el) el.innerHTML = total + '<span class="unit">分</span>';
  updateSliderGradient(targetId + '-' + categoryId, val);
}

function updateSliderGradient(id, val) {
  const slider = document.getElementById('slider-' + id);
  if (!slider) return;
  const pct = val + '%';
  slider.style.background = 'linear-gradient(to right, #1a56db 0%, #1a56db ' + pct + ', #e5e7eb ' + pct + ', #e5e7eb 100%)';
}

function confirmScore(id) {
  confirmedSet.add(id);
  const card = document.getElementById('card-' + id);
  card.classList.add('scored');
  const btn = document.getElementById('btn-' + id);
  btn.className = 'btn-confirm done';
  btn.textContent = '✓ 已确认';
  btn.disabled = true;
  const top = card.querySelector('.card-top');
  if (!top.querySelector('.scored-badge')) top.insertAdjacentHTML('beforeend', '<span class="scored-badge">✓ 已确认</span>');
  document.querySelectorAll('#card-' + id + ' .score-slider').forEach(s => s.disabled = true);
  const targets = getTargetsForRound(getActiveRound());
  updateProgress(targets.length, getCategories(getActiveRound()));
}

function updateProgress(targetCount, categories) {
  const done = confirmedSet.size;
  const hint = document.getElementById('target-count-hint');
  if (hint) hint.textContent = '（共 ' + targetCount + ' 人）';
  document.getElementById('progress-text').textContent = '已确认 ' + done + ' / ' + targetCount;
  document.getElementById('progress-bar').style.width = (targetCount > 0 ? done / targetCount * 100 : 0) + '%';
  const btn = document.getElementById('btn-submit-all');
  const tip = document.getElementById('submit-tip');
  if (done === targetCount) { btn.disabled = false; tip.textContent = '所有评分已确认，点击提交！'; }
  else { btn.disabled = true; tip.textContent = '还有 ' + (targetCount - done) + ' 人未确认'; }
}

// ===== SUBMIT ALL =====
async function submitAll() {
  if (!currentUser) return;
  const round = getActiveRound();
  if (!round) { showToast('暂无激活的考评轮次'); return; }
  if (confirmedSet.size === 0) { showToast('请先确认所有评分'); return; }
  const categories = getCategories(round);
  const targets = getTargetsForRound(round);
  showLoading(true); setLoadingMsg('正在提交评分...');
  const client = initSupabase();
  if (!client) { showToast('网络错误'); showLoading(false); return; }
  try {
    const rows = [];
    targets.forEach(t => {
      categories.forEach(c => {
        const score = currentScores[t.id] && currentScores[t.id][c.id] !== undefined ? currentScores[t.id][c.id] : 50;
        rows.push({
          round_id: round.id,
          rater_id: currentUser.id,
          target_id: t.id,
          category_id: c.id,
          raw_score: score,
          score: categories.length === 1 ? score : calcRowTotal(t.id, categories)
        });
      });
    });
    for (const row of rows) {
      await client.from('scores').upsert(row, { onConflict: 'round_id,rater_id,target_id,category_id' });
    }
    showLoading(false);
    showModal('🎉', '评分提交成功！', '您已完成对 ' + targets.length + ' 名同事的评分，感谢您的参与！');
    document.getElementById('btn-submit-all').disabled = true;
    document.getElementById('btn-submit-all').textContent = '✓ 已提交';
    await loadAllData();
    renderDashboard();
  } catch(e) { console.error('submitAll error:', e); showLoading(false); showToast('提交失败: ' + e.message); }
}

// ===== DASHBOARD =====
function calcScoresForRound(round) {
  const result = {};
  const categories = getCategories(round);
  allUsers.forEach(u => {
    if (u.is_admin) return;
    const received = []; // {catId: [scores]}
    const catScores = {};
    categories.forEach(c => catScores[c.id] = []);
    Object.entries(round.scores).forEach(([raterId, raterScores]) => {
      if (parseInt(raterId) === u.id) return; // skip self
      if (!raterScores[u.id]) return;
      const entry = raterScores[u.id];
      if (categories.length === 1) {
        // old format or single category
        const v = entry._total !== undefined ? entry._total : (entry.total !== undefined ? entry.total : (typeof entry === 'number' ? entry : 50));
        if (typeof v === 'number' && !isNaN(v)) catScores['total'].push(v);
      } else {
        categories.forEach(c => {
          if (entry[c.id] !== undefined) catScores[c.id].push(entry[c.id]);
        });
      }
    });
    let finalScore = null;
    if (categories.length === 1) {
      const arr = catScores['total'];
      if (arr.length > 0) finalScore = Math.round(arr.reduce((a, b) => a + b, 0) / arr.length * 10) / 10;
    } else {
      let weightedSum = 0;
      let hasAny = false;
      categories.forEach(c => {
        const arr = catScores[c.id];
        if (arr.length > 0) {
          const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
          weightedSum += avg * (c.weight / 100);
          hasAny = true;
        }
      });
      if (hasAny) finalScore = Math.round(weightedSum * 10) / 10;
    }
    const weight = currentRoundWeights[u.id] || 1.0;
    result[u.id] = {
      member: u,
      rawScore: finalScore,
      finalScore: finalScore !== null ? Math.round(finalScore * weight * 10) / 10 : null,
      weight: weight,
      raterCount: Object.values(catScores).filter(a => a.length > 0).length > 0 ? Object.keys(round.scores).length : 0
    };
  });
  return result;
}

function assignGrades(sorted) {
  const withScores = sorted.filter(x => x.finalScore !== null);
  const grades = {};
  if (withScores.length === 0) return grades;
  const topN = Math.max(1, Math.ceil(withScores.length * 0.2));
  const bottomN = Math.max(1, Math.ceil(withScores.length * 0.1));
  withScores.forEach((x, i) => {
    if (i < topN) grades[x.member.id] = 'A';
    else if (i >= withScores.length - bottomN) grades[x.member.id] = 'C';
    else grades[x.member.id] = 'B';
  });
  sorted.forEach(x => { if (grades[x.member.id] === undefined) grades[x.member.id] = '-'; });
  return grades;
}

    '</div>' +

      '<div class="grade-card grade-B"><div class="grade-letter">B</div><div class="grade-names">' + (allSorted.filter(x => grades[x.member.id] === 'B').map(x => x.member.name).join('、') || '暂无') + '</div><div class="grade-rule">中间成员</div></div>' +

function renderRankList(sorted, grades, visibleUsers) {
  if (sorted.length === 0) return '<p style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px">暂无数据</p>';
  const visibleIds = new Set(visibleUsers.map(u => u.id));
  const items = sorted.map((x, i) => {
    if (!visibleIds.has(x.member.id)) return '';
    const g = grades[x.member.id] || '-';
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    const depts = getUserDepartments(x.member.id);
    const deptStr = depts.map(d => d.name).join('、');
    return '<li class="rank-item">' +
      '<div class="rank-num ' + rankClass + '">' + (i + 1) + '</div>' +
      '<div class="avatar" style="background:' + (x.member.color || '#1a56db') + ';width:36px;height:36px;font-size:14px">' + (x.member.name || '?')[0] + '</div>' +
      '<div style="flex:1"><div class="rank-name">' + (x.member.name || '未知') + '</div><div class="rank-depts">' + (deptStr || '未分配部门') + '</div></div>' +
      '<span class="perf-badge perf-' + (g === '-' ? 'B' : g) + '">' + g + '</span>' +
      '<div class="rank-score-wrap"><div class="rank-score">' + x.finalScore + '</div><div class="rank-score-unit">分</div></div>' +
    '</li>';
  });
  return '<ul class="rank-list">' + items.join('') + '</ul>';
}

function renderPodium(top3) {
  if (top3.length === 0) return '';
  const makePodiumItem = (x, cls) => {
    if (!x) return '<div class="podium-item"><div class="podium-block"></div><div class="podium-name">-</div><div class="podium-score">-</div></div>';
    return '<div class="podium-item podium-' + cls + '">' +
      '<div class="podium-block"><div class="podium-avatar" style="background:' + (x.member.color || '#1a56db') + '">' + (x.member.name || '?')[0] + '</div></div>' +
      '<div class="podium-name">' + (x.member.name || '?') + '</div><div class="podium-score">' + x.finalScore + '分</div></div>';
  };
  const [p1, p2, p3] = [top3[0] || null, top3[1] || null, top3[2] || null];
  return '<div class="panel" style="margin-bottom:16px"><div class="panel-title">🏆 前三名</div><div class="podium">' +
    makePodiumItem(p2, '2') + makePodiumItem(p1, '1') + makePodiumItem(p3, '3') +
  '</div></div>';
}

function renderDetailTable(sorted, grades, visibleUsers) {
  const visibleIds = new Set(visibleUsers.map(u => u.id));
  const rows = sorted.filter(x => visibleIds.has(x.member.id)).map((x, i) => {
    const g = grades[x.member.id] || '-';
    const depts = getUserDepartments(x.member.id);
    return '<tr><td>' + (i + 1) + '</td><td>' + (x.member.name || '?') + '</td><td>' + (depts.map(d => d.name).join('、') || '-') + '</td><td style="color:#60a5fa;font-weight:700">' + (x.finalScore || '-') + '</td><td><span class="perf-badge perf-' + (g === '-' ? 'B' : g) + '">' + g + '</span></td></tr>';
  });
  if (rows.length === 0) return '<p style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px">暂无数据</p>';
  return '<table class="detail-table"><thead><tr><th>#</th><th>姓名</th><th>部门</th><th>综合分</th><th>等级</th></tr></thead><tbody>' + rows.join('') + '</tbody></table>';
}

function subscribeRealtime() {
  if (realtimeChannel) { realtimeChannel.unsubscribe(); realtimeChannel = null; }
  const client = initSupabase();
  if (!client) return;
  realtimeChannel = client.channel('public-scores')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, () => { refreshDashboard(); })
    .subscribe(status => { if (status === 'CHANNEL_ERROR') setTimeout(subscribeRealtime, 3000); });
}

  await loadAllData();
  renderDashboard();
}

async function saveUser(editId) {
  const username = document.getElementById('u-username').value.trim();
  const name = document.getElementById('u-name').value.trim();
  const role = document.getElementById('u-role').value.trim();
  const phone = document.getElementById('u-phone').value.trim();
  const gender = document.querySelector('input[name="u-gender"]:checked')?.value || '';
  const isActive = document.querySelector('input[name="u-active"]:checked')?.value === 'true';
  const deptCheckboxes = document.querySelectorAll('#modal-body input[type="checkbox"]:checked');
  const selectedDepts = Array.from(deptCheckboxes).map(cb => parseInt(cb.value));
  if (!username) { showToast('请填写登录账号'); return; }
  if (!name) { showToast('请填写姓名'); return; }
  const client = initSupabase();
  if (!client) { showToast('网络错误'); return; }
  showLoading(true);
  try {
    if (editId) {
      await client.from('users').update({ username, name, role, phone, gender, is_active: isActive, updated_at: new Date().toISOString() }).eq('id', editId);
      // Update dept memberships
      await client.from('department_members').delete().eq('user_id', editId);
      for (const deptId of selectedDepts) {
        await client.from('department_members').insert({ user_id: editId, department_id: deptId });
      }
      showModal('✅', '修改成功', '人员信息已更新');
    } else {
      // Check if username exists
      const { data: existing } = await client.from('users').select('id').eq('username', username).single();
      if (existing) { showToast('账号已存在'); showLoading(false); return; }
      const { data: newUser, error } = await client.from('users').insert({ username, password: '1234', name, role, phone, gender, is_admin: false, must_change_pwd: true }).select('id').single();
      if (error) throw error;
      for (const deptId of selectedDepts) {
        await client.from('department_members').insert({ user_id: newUser.id, department_id: deptId });
      }
      showModal('✅', '添加成功', '人员已添加，初始密码为 1234');
    }
    await loadAllData();
    renderPersonnelSection();
    showLoading(false);
  } catch(e) { showLoading(false); showToast('操作失败: ' + e.message); }
}

function deleteUser(userId) {
  const u = allUsers.find(x => x.id === userId);

  showConfirmModal('🗑️', '删除人员', '确定要删除 "' + u.name + '" 吗？删除后数据无法恢复！', async () => {

}

// ===== DEPARTMENT MANAGEMENT =====
function renderDepartmentSection() {
  const el = document.getElementById('admin-departments');
  const rootDepts = departments.filter(d => !d.parent_id);
  if (departments.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>暂无部门</p><p style="margin-top:8px">点击下方按钮添加顶级部门</p><div style="margin-top:16px"><button class="btn btn-primary btn-sm" onclick="showAddDeptModal()">+ 添加顶级部门</button></div></div>';
    return;
  }
  el.innerHTML = '<div style="margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="showAddDeptModal()">+ 添加部门</button></div><div class="dept-tree">' + renderDeptTreeNode(rootDepts, 0) + '</div>';
}

function renderDeptTreeNode(depts, level) {
  if (!depts || depts.length === 0) return '';
  return depts.map(d => {
    const children = departments.filter(c => c.parent_id === d.id);
    const head = d.head_user_id ? allUsers.find(u => u.id === d.head_user_id) : null;
    const childDepts = getChildDepts(d.id);
    const memberCount = deptMembers.filter(dm => childDepts.map(c => c.id).concat([d.id]).includes(dm.department_id)).length;
    const canAddChild = level < 4; // max 5 levels (0-4)
    return '<div class="dept-node" style="margin-left:' + (level * 20) + 'px">' +
      '<div class="dept-node-header">' +
        '<div class="dept-info">' +
          '<span class="dept-icon">📁</span>' +
          '<span class="dept-name">' + (d.name || '未命名') + '</span>' +
          (head ? '<span class="dept-head">负责人: ' + head.name + '</span>' : '<span class="dept-head" style="color:#f87171">（未设负责人）</span>') +
          '<span class="dept-level-badge">第' + ((d.level || 1)) + '级</span>' +
          '<span style="font-size:12px;color:rgba(255,255,255,0.35)">' + memberCount + '人</span>' +
        '</div>' +
        '<div class="dept-actions">' +
          '<button class="btn-tiny" onclick="showEditDeptModal(' + d.id + ')">编辑</button>' +
          (canAddChild ? '<button class="btn-tiny" onclick="showAddDeptModal(' + d.id + ')">+子部门</button>' : '') +
          '<button class="btn-tiny danger" onclick="deleteDepartment(' + d.id + ')">删除</button>' +
        '</div>' +
      '</div>' +
      (children.length > 0 ? '<div style="margin-top:6px;padding-left:24px">' + renderDeptTreeNode(children, level + 1) + '</div>' : '') +
    '</div>';
  }).join('');
}

function showAddDeptModal(parentId) {
  const parent = parentId ? departments.find(d => d.id === parentId) : null;
  const parentOptions = [{id:null, name:'（顶级部门）'}].concat(departments.map(d => ({id:d.id, name:d.name}))).map(d => '<option value="' + (d.id || '') + '"' + (parentId && d.id === parentId ? ' selected' : '') + '>' + d.name + '</option>').join('');
  const userOptions = allUsers.filter(u => !u.is_admin).map(u => '<option value="' + u.id + '">' + (u.name || u.username) + '</option>').join('');
  const nextLevel = parent ? (parent.level || 1) + 1 : 1;
  if (nextLevel > 5) { showToast('已达到最大层级（5级）'); return; }
  document.getElementById('modal-emoji').textContent = '🏢';
  document.getElementById('modal-title').textContent = '添加部门';
  document.getElementById('modal-body').innerHTML = '<div style="text-align:left">' +
    '<div class="form-group"><label class="form-label">部门名称 *</label><input class="form-input" id="d-name" placeholder="如：销售部" maxlength="100" /></div>' +
    '<div class="form-group"><label class="form-label">上级部门</label><select class="form-select" id="d-parent">' + parentOptions + '</select></div>' +
    '<div class="form-group"><label class="form-label">部门负责人</label><select class="form-select" id="d-head"><option value="">-- 不设置 --</option>' + userOptions + '</select></div></div>';
  document.getElementById('modal-actions').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveDepartment()">保存</button>';
  document.getElementById('modal').classList.add('show');
}

function showEditDeptModal(deptId) {
  const d = departments.find(x => x.id === deptId);
  if (!d) return;
  const parentOptions = [{id:null, name:'（顶级部门）'}].concat(departments.filter(x => x.id !== deptId).map(x => ({id:x.id, name:x.name}))).map(x => '<option value="' + (x.id || '') + '">' + x.name + '</option>').join('');
  const userOptions = allUsers.filter(u => !u.is_admin).map(u => '<option value="' + u.id + '"' + (u.id === d.head_user_id ? ' selected' : '') + '>' + (u.name || u.username) + '</option>').join('');
  document.getElementById('modal-emoji').textContent = '✏️';
  document.getElementById('modal-title').textContent = '编辑部门';
  document.getElementById('modal-body').innerHTML = '<div style="text-align:left">' +
    '<div class="form-group"><label class="form-label">部门名称 *</label><input class="form-input" id="d-name" value="' + (d.name || '') + '" maxlength="100" /></div>' +
    '<div class="form-group"><label class="form-label">上级部门</label><select class="form-select" id="d-parent">' + parentOptions + '</select></div>' +
    '<div class="form-group"><label class="form-label">部门负责人</label><select class="form-select" id="d-head"><option value="">-- 不设置 --</option>' + userOptions + '</select></div></div>';
  document.getElementById('modal-actions').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveDepartment(' + deptId + ')">保存</button>';
  document.getElementById('modal').classList.add('show');
}

async function saveDepartment(editId) {
  const name = document.getElementById('d-name').value.trim();
  const parentIdVal = document.getElementById('d-parent').value;
  const parentId = parentIdVal ? parseInt(parentIdVal) : null;
  const headIdVal = document.getElementById('d-head').value;
  const headUserId = headIdVal ? parseInt(headIdVal) : null;
  if (!name) { showToast('请填写部门名称'); return; }
  // Check level
  let level = 1;
  if (parentId) {
    const parent = departments.find(d => d.id === parentId);
    level = (parent.level || 1) + 1;
  }
  if (level > 5) { showToast('已达到最大层级（5级）'); return; }
  const client = initSupabase();
  if (!client) return;
  showLoading(true);
  try {
    if (editId) {
      await client.from('departments').update({ name, parent_id: parentId, head_user_id: headUserId, level, updated_at: new Date().toISOString() }).eq('id', editId);
      showModal('✅', '修改成功', '部门信息已更新');
    } else {
      await client.from('departments').insert({ name, parent_id: parentId, head_user_id: headUserId, level, sort_order: departments.length });
      showModal('✅', '添加成功', '部门已添加');
    }
    await loadAllData();
    renderDepartmentSection();
    showLoading(false);
  } catch(e) { showLoading(false); showToast('操作失败: ' + e.message); }
}

function deleteDepartment(deptId) {
  const d = departments.find(x => x.id === deptId);
  if (!d) return;
  const children = departments.filter(x => x.parent_id === deptId);
  const members = deptMembers.filter(dm => dm.department_id === deptId);
  let msg = '确定要删除 "' + d.name + '" 吗？';
  if (children.length > 0) msg += '\n该部门有 ' + children.length + ' 个子部门，子部门也会被删除。';
  if (members.length > 0) msg += '\n该部门有 ' + members.length + ' 名成员关联。';
  msg += '\n数据无法恢复！';
  showConfirmModal('🗑️', '删除部门', msg, async () => {
    const client = initSupabase();
    if (!client) return;
    showLoading(true);
    try {
      await client.from('departments').delete().eq('id', deptId);
      await loadAllData();
      renderDepartmentSection();
      showToast('部门已删除');
    } catch(e) { showToast('删除失败: ' + e.message); }
    showLoading(false);
  });
}

// ===== ROUND MANAGEMENT =====
function renderRoundsSection() {
  const rounds = (roundsData && roundsData.rounds) || [];
  const activeRound = getActiveRound();
  let html = `
  <div class="section-header">
    <h2>🗓️ 轮次管理</h2>
    <button class="btn-primary" onclick="showNewRoundModal()">+ 新建轮次</button>
  </div>`;
  if (rounds.length === 0) {
    html += '<div class="empty-tip">暂无轮次，请点击"新建轮次"创建</div>';
    document.getElementById('admin-rounds').innerHTML = html;
    return;
  }
  html += '<div class="rounds-list">';
  rounds.slice().reverse().forEach(r => {
    const isActive = activeRound && r.id === activeRound.id;
    const statusLabel = r.status === 'active'
      ? '<span class="badge badge-green">进行中</span>'
      : r.status === 'closed' ? '<span class="badge badge-gray">已结束</span>' : '<span class="badge">未知</span>';
    html += `
    <div class="round-card ${isActive ? 'round-card-active' : ''}">
      <div class="round-card-header">
        <div class="round-card-title">
          <strong>${r.name || '未命名轮次'}</strong>
          ${statusLabel}
          ${isActive ? '<span class="badge badge-blue">当前轮次</span>' : ''}
        </div>
        <div class="round-card-actions">
          <button class="btn-sm btn-outline" onclick="showNewRoundModal(${r.id})">编辑</button>
          ${!isActive ? '<button class="btn-sm btn-success" onclick="switchToRound(${r.id})">设为当前</button>' : ''}
          <button class="btn-sm btn-danger" onclick="deleteRound(${r.id})">删除</button>
        </div>
      </div>
      <div class="round-card-meta">
        <span>📅 ${r.start_date ? r.start_date.slice(0,10) : '未设置'} ~ ${r.end_date ? r.end_date.slice(0,10) : '未设置'}</span>
      </div>
      ${r.description ? '<div class="round-card-desc">' + r.description + '</div>' : ''}
      <div class="round-card-cats">
        <strong>评分维度（权重）：</strong>
        ${renderRoundCategories(r)}

  html += '</div>';

function renderRoundCategories(r) {

  return r.categories.map(c =>
    '<span class="cat-tag">' + c.name + ' ' + (parseFloat(c.weight || 0)*100) + '%</span>'
  ).join(' ');
}

function showNewRoundModal(editId) {
  const r = editId ? (roundsData || []).find(x => x.id === editId) : null;
  const nowStr = new Date().toISOString().slice(0,16);
  const ymd = nowStr.slice(0,10);
  const categories = r && r.categories ? r.categories : [{ name: '', weight: 1 }];
  let catHtml = '';
  categories.forEach(function(c, i) {
    catHtml += '<div class="cat-item-row" id="cat-row-' + i + '">' +
      '<input type="text" class="form-control cat-name" placeholder="维度名称，如：工作态度" value="' + (c.name || '') + '" oninput="updateCatSum()">' +
      '<input type="number" class="form-control cat-weight" placeholder="权重%" min="1" max="100" value="' + (parseFloat(c.weight || 0)*100 || 100) + '" oninput="updateCatSum()">' +
      '<button class="btn-icon" onclick="removeCatItem(' + i + ')">✕</button>' +
    '</div>';
  });

    '<div class="form-group"><label>说明</label><textarea id="r-desc" class="form-control" rows="2" placeholder="可选备注说明">' + (r ? (r.description || '') : '') + '</textarea></div>' +
    '<div class="form-group"><label>评分维度（至少1项，权重之和须=100%）</label>' +
    '<div id="cat-list">' + catHtml + '</div>' +
    '<button type="button" class="btn-sm btn-outline mt-8" onclick="addCategoryItem()">+ 添加维度</button>' +
    '<div class="cat-sum-bar"><div class="cat-sum-bar-fill" id="cat-sum-bar-fill" style="width:100%"></div><span class="cat-sum-text" id="cat-sum-text">权重合计：100%</span></div></div>' +

      '<label class="scope-opt"><input type="radio" name="r-scope" value="all" ' + ((!r || r.scope === 'all') ? 'checked' : '') + '><span>全部部门</span></label>' +

  '</form>', 'lg');

function renderDeptCheckboxesForRound(selectedIds) {
  const container = document.getElementById('dept-check-list');
  if (!container) return;
  if (departments.length === 0) {
    container.innerHTML = '<div class="empty-tip">暂无部门，请先添加部门</div>';
    return;
  }
  const topDepts = departments.filter(function(d) { return !d.parent_id; });
  let html = '';
  topDepts.forEach(function(d) {
    const checked = selectedIds.indexOf(d.id) !== -1 ? 'checked' : '';
    const children = departments.filter(function(c) { return c.parent_id === d.id; });
    let childHtml = '';
    children.forEach(function(c) {
      const cChecked = selectedIds.indexOf(c.id) !== -1 ? 'checked' : '';
      childHtml += '<label class="dept-check-item"><input type="checkbox" value="' + c.id + '" ' + cChecked + '> ' + c.name + '</label>';
    });
    html += '<div class="dept-check-group">' +
      '<label class="dept-check-item"><input type="checkbox" value="' + d.id + '" ' + checked + ' onclick="toggleScopeOption(this)"> <strong>' + d.name + '</strong></label>' +
      (childHtml ? '<div class="dept-check-children">' + childHtml + '</div>' : '') +
    '</div>';
  });
  container.innerHTML = html;
}

function toggleScopeOption(el) {
  var scopeRadios = document.getElementsByName('r-scope');
  var selectedScope = 'all';
  for (var i = 0; i < scopeRadios.length; i++) { if (scopeRadios[i].checked) { selectedScope = scopeRadios[i].value; break; } }
  document.getElementById('scope-dept-picker').style.display = selectedScope === 'dept' ? 'block' : 'none';
}

function addCategoryItem() {
  var list = document.getElementById('cat-list');
  var idx = list.children.length;
  var row = document.createElement('div');
  row.className = 'cat-item-row';
  row.id = 'cat-row-' + idx;
  row.innerHTML = '<input type="text" class="form-control cat-name" placeholder="维度名称" value="" oninput="updateCatSum()">' +
    '<input type="number" class="form-control cat-weight" placeholder="权重%" min="1" max="100" value="0" oninput="updateCatSum()">' +
    '<button class="btn-icon" onclick="removeCatItem(' + idx + ')">✕</button>';
  list.appendChild(row);
  updateCatSum();
}

function removeCatItem(idx) {
  var row = document.getElementById('cat-row-' + idx);
  if (row) row.remove();
  updateCatSum();
}

function updateCatSum() {
  var total = 0;
  var rows = document.querySelectorAll('#cat-list .cat-item-row');
  rows.forEach(function(row) {
    var inp = row.querySelector('.cat-weight');
    if (inp) {
      var v = parseFloat(inp.value);
      if (!isNaN(v) && v > 0) total += v;
    }
  });
  var bar = document.getElementById('cat-sum-bar-fill');
  var text = document.getElementById('cat-sum-text');
  if (!bar || !text) return;
  var pct = Math.min(total, 100);
  bar.style.width = pct + '%';
  bar.style.background = total === 100 ? '#0ea76e' : total > 100 ? '#ef4444' : '#f59e0b';
  text.textContent = '权重合计：' + total + '%' + (total !== 100 ? '（需=100%）' : ' ✓');
  text.style.color = total === 100 ? '#0ea76e' : '#ef4444';
}

async function confirmNewRound(editId) {
  var name = document.getElementById('r-name').value.trim();
  if (!name) { showToast('请填写轮次名称'); return; }
  var startDate = document.getElementById('r-start').value;
  var endDate = document.getElementById('r-end').value;
  var desc = document.getElementById('r-desc').value.trim();
  var scopeRadios = document.getElementsByName('r-scope');
  var selectedScope = 'all';
  for (var i = 0; i < scopeRadios.length; i++) { if (scopeRadios[i].checked) { selectedScope = scopeRadios[i].value; break; } }
  var scopeDeptIds = [];
  if (selectedScope === 'dept') {
    var checkboxes = document.querySelectorAll('#dept-check-list input[type=checkbox]:checked');
    for (var j = 0; j < checkboxes.length; j++) scopeDeptIds.push(parseInt(checkboxes[j].value));
  }
  var catRows = document.querySelectorAll('#cat-list .cat-item-row');
  var categories = [];
  var weightSum = 0;
  var valid = true;
  catRows.forEach(function(row) {
    var nameInp = row.querySelector('.cat-name');
    var weightInp = row.querySelector('.cat-weight');
    var catName = nameInp ? nameInp.value.trim() : '';
    var catWeight = parseFloat(weightInp ? weightInp.value : '0');
    if (!catName) { valid = false; return; }
    if (isNaN(catWeight) || catWeight <= 0) { valid = false; return; }
    categories.push({ name: catName, weight: catWeight / 100 });
    weightSum += catWeight;
  });
  if (!valid || categories.length === 0) { showToast('请完善所有评分维度名称和权重'); return; }
  if (Math.abs(weightSum - 100) > 0.01) { showToast('权重合计必须=100%，当前=' + weightSum); return; }
  var client = initSupabase();
  if (!client) return;
  showLoading(true);
  try {
    var payload = {
      name: name,
      start_date: startDate || null,
      end_date: endDate || null,
      description: desc,
      scope: selectedScope,
      scope_dept_ids: selectedScope === 'dept' ? scopeDeptIds : [],
      categories: categories,
      status: 'active',
      updated_at: new Date().toISOString()
    };
    if (editId) {
      await client.from('rounds').update(payload).eq('id', editId);
    } else {
      await client.from('rounds').insert(payload);
    }
    await loadRoundsData();
    renderRoundsSection();
    hideModal();
    showToast((editId ? '修改' : '创建') + '成功');
  } catch(e) { showToast('保存失败: ' + e.message); }
  showLoading(false);
}

async function switchToRound(roundId) {
  var client = initSupabase();
  if (!client) return;
  showLoading(true);
  try {
    var existing = appConfig.find(function(c) { return c.key === 'active_round_id'; });
    if (existing) {
      await client.from('app_config').update({ value: String(roundId) }).eq('key', 'active_round_id');
    } else {
      await client.from('app_config').insert({ key: 'active_round_id', value: String(roundId) });
    }
    await loadRoundsData();
    renderRoundsSection();
    showToast('已切换为当前轮次');
  } catch(e) { showToast('切换失败: ' + e.message); }
  showLoading(false);
}

function deleteRound(roundId) {
  var r = (roundsData || []).find(function(x) { return x.id === roundId; });
  if (!r) return;
  showConfirmModal('🗑️', '删除轮次', '确定要删除轮次「' + r.name + '」吗？所有相关评分数据也会被清除！', async function() {
    var client = initSupabase();
    if (!client) return;
    showLoading(true);
    try {
      await client.from('rounds').delete().eq('id', roundId);
      await loadRoundsData();
      renderRoundsSection();
      showToast('轮次已删除');
    } catch(e) { showToast('删除失败: ' + e.message); }
    showLoading(false);
  });
}

// ===== INIT =====
async function init() {
  var APP_VERSION = '1.1.0';
  var LS_VER_KEY = 'jx_v110_ver';
  var storedVer = localStorage.getItem(LS_VER_KEY);
  if (storedVer && storedVer !== APP_VERSION) {
    localStorage.removeItem('cangku_current_user');
    localStorage.removeItem('cangku_last_page');
    localStorage.removeItem('jx_v110_scores');
    localStorage.removeItem('jx_v110_rounds');
    localStorage.removeItem('jx_current_user');
    localStorage.removeItem('jx_session');
  }
  localStorage.setItem(LS_VER_KEY, APP_VERSION);
  try {
    await loadAllData();
  } catch(e) {
    console.warn('Cloud load failed, using local fallback:', e);
  }
  var savedUser = localStorage.getItem('cangku_current_user');
  if (savedUser) {
    try {
      var uObj = JSON.parse(savedUser);
      var u = allUsers.find(function(x) { return String(x.id) === String(uObj.id); });
      if (u) {
        currentUser = u;
        updateNavForUser();
        var savedPage = localStorage.getItem('cangku_last_page') || 'dashboard';
        showPage(savedPage);
        if (currentUser.must_change_pwd) { showChangePassword(true); }
        return;
      }
    } catch(e) { console.warn('Restore login failed:', e); }
  }
  showPage('login');
  showToast('请先登录', 0);
}
init();
</script>
